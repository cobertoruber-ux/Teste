<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Razão">
<meta name="theme-color" content="#0B0E14">
<title>Razão — Painel Financeiro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E14;
    --panel: #141A24;
    --panel-2: #1B2330;
    --border: #232B3A;
    --text: #E6EDF5;
    --text-muted: #8B96A8;
    --teal: #2DD4C7;
    --rose: #F4495F;
    --amber: #FBBF55;
    --teal-glow: rgba(45,212,199,0.55);
    --rose-glow: rgba(244,73,95,0.6);
    --amber-glow: rgba(251,191,85,0.55);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  #app { max-width: 480px; margin: 0 auto; padding: 26px 16px 40px; }
  input, select, button { font-family: inherit; }
  input[type="date"] { color-scheme: dark; }
  select.field-input { color-scheme: dark; }
  input:focus, select:focus, button:focus-visible {
    outline: 2px solid var(--teal);
    outline-offset: 2px;
  }
  ::placeholder { color: var(--text-muted); }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .eyebrow { font-size: 10.5px; letter-spacing: 0.14em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 3px; }
  .brand { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 23px; letter-spacing: 0.01em; color: var(--text); }
  .month-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }

  .status-pill { display: inline-flex; align-items: center; gap: 7px; background: var(--panel-2); border: 1px solid var(--border); border-radius: 999px; padding: 7px 13px; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
  .led { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .led.blinking { animation: led-blink 1s ease-in-out infinite; }
  @keyframes led-blink {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.8); }
  }

  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .stat-balance { grid-column: 1 / -1; }
  .stat-label { font-size: 10.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 7px; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 21px; font-weight: 700; }
  .stat-balance .stat-value { font-size: 32px; }

  .card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 16px; }
  .gauge-card { display: flex; flex-direction: column; align-items: center; }
  .gauge-card.gauge-alert { animation: card-pulse 1.4s ease-in-out infinite; }
  @keyframes card-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244,73,95,0); }
    50% { box-shadow: 0 0 26px 3px var(--rose-glow); }
  }
  .card-header { font-family: 'Space Grotesk', sans-serif; font-size: 12.5px; font-weight: 600; letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 14px; text-transform: uppercase; align-self: flex-start; }
  .gauge-wrap { position: relative; width: 140px; height: 140px; margin-bottom: 14px; }
  .gauge-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gauge-pct { font-family: 'JetBrains Mono', monospace; font-size: 27px; font-weight: 700; }
  .gauge-sub { font-size: 9.5px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-top: 2px; }
  .gauge-info { text-align: center; width: 100%; }
  .limit-row { display: flex; align-items: baseline; gap: 8px; justify-content: center; margin-bottom: 8px; }
  .limit-value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }
  .edit-link { font-size: 11px; color: var(--text-muted); background: none; border: none; text-decoration: underline; cursor: pointer; padding: 0; }
  .limit-edit-row { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 8px; }
  .limit-input { font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 7px 9px; border: 1px solid var(--border); border-radius: 6px; width: 100px; background: var(--panel-2); color: var(--text); }
  .btn-dark-sm { font-size: 11.5px; background: var(--teal); color: #06231F; border: none; border-radius: 6px; padding: 8px 11px; font-weight: 700; cursor: pointer; }
  .spent-row { font-size: 12px; color: var(--text-muted); }
  .spent-row strong { color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .alert-line { margin-top: 12px; font-size: 12px; font-weight: 600; text-align: center; }

  .progress-track { height: 9px; background: var(--panel-2); border-radius: 5px; overflow: hidden; margin: 10px 0; }
  .progress-fill { height: 100%; transition: width 0.4s ease; }
  .goal-msg { font-size: 12px; font-weight: 600; text-align: center; }

  .chart-legend-top { display: flex; gap: 16px; font-size: 10.5px; color: var(--text-muted); margin-bottom: 12px; }
  .chart-legend-top .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px; }
  .bar-chart { position: relative; height: 120px; margin-bottom: 4px; }
  .limit-line { position: absolute; left: 0; right: 0; border-top: 1px dashed var(--text-muted); opacity: 0.55; }
  .bars-row { display: flex; align-items: flex-end; height: 100%; gap: 6px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
  .bar-wrap { width: 100%; height: 100%; display: flex; align-items: flex-end; justify-content: center; gap: 4px; }
  .bar { width: 13px; border-radius: 3px 3px 0 0; min-height: 2px; transition: height 0.4s ease; }
  .bar-income { background: var(--teal); }
  .bar-expense { background: var(--rose); }
  .bar-label { font-size: 9.5px; color: var(--text-muted); margin-top: 7px; letter-spacing: 0.03em; }
  .bar-label-current { color: var(--text); font-weight: 700; }
  .chart-legend { font-size: 10px; color: var(--text-muted); text-align: right; margin-top: 2px; }

  .cat-row { margin-bottom: 12px; }
  .cat-row:last-child { margin-bottom: 0; }
  .cat-row-top { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 5px; }
  .cat-name { color: var(--text); }
  .cat-amount { font-family: 'JetBrains Mono', monospace; color: var(--text-muted); font-size: 11.5px; }
  .cat-bar-track { height: 6px; background: var(--panel-2); border-radius: 3px; overflow: hidden; }
  .cat-bar-fill { height: 100%; background: var(--rose); border-radius: 3px; }

  .btn-primary { width: 100%; padding: 14px; margin-bottom: 18px; background: var(--teal); color: #06231F; border: none; border-radius: 12px; font-weight: 700; font-size: 14px; letter-spacing: 0.02em; cursor: pointer; box-shadow: 0 0 18px 0 var(--teal-glow); }

  .form-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 18px; margin-bottom: 18px; }
  .type-row { display: flex; gap: 8px; margin-bottom: 14px; }
  .type-btn { flex: 1; padding: 10px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; background: var(--panel-2); border: 1px solid var(--border); color: var(--text-muted); }
  .type-btn.active-income { background: rgba(45,212,199,0.14); border-color: var(--teal); color: var(--teal); }
  .type-btn.active-expense { background: rgba(244,73,95,0.14); border-color: var(--rose); color: var(--rose); }
  .field-label { display: block; font-size: 10.5px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.08em; }
  .field-input { width: 100%; font-size: 14px; padding: 10px 11px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; background: var(--panel-2); color: var(--text); }
  .field-input.mono { font-family: 'JetBrains Mono', monospace; font-size: 16px; }
  .field-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .field-half { flex: 1; }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); margin-bottom: 14px; cursor: pointer; }
  .checkbox-row input { width: 16px; height: 16px; accent-color: var(--teal); }
  .form-error { font-size: 12px; color: var(--rose); margin-bottom: 10px; }
  .form-actions { display: flex; gap: 8px; }
  .btn-submit { flex: 1; padding: 11px; background: var(--teal); color: #06231F; border: none; border-radius: 8px; font-weight: 700; font-size: 13.5px; cursor: pointer; }
  .btn-cancel { padding: 11px 16px; background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text-muted); font-size: 13.5px; cursor: pointer; }

  .section-label { font-size: 11px; letter-spacing: 0.1em; color: var(--text-muted); text-transform: uppercase; margin-bottom: 10px; }
  .empty-state { text-align: center; padding: 26px 10px; color: var(--text-muted); font-size: 13px; border: 1px dashed var(--border); border-radius: 12px; }
  .list-card { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 18px; }
  .tx-row { display: flex; align-items: center; gap: 10px; padding: 13px 14px; border-left: 3px solid transparent; border-bottom: 1px solid var(--border); }
  .tx-row:last-child { border-bottom: none; }
  .tx-row.income { border-left-color: var(--teal); }
  .tx-row.expense { border-left-color: var(--rose); }
  .tx-date { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); width: 46px; flex-shrink: 0; }
  .tx-mid { flex: 1; min-width: 0; }
  .tx-desc { font-size: 13.5px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .tx-cat { font-size: 11px; color: var(--text-muted); }
  .tx-amount { font-family: 'JetBrains Mono', monospace; font-size: 13.5px; font-weight: 600; flex-shrink: 0; }
  .tx-edit, .tx-delete, .rec-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
  .tx-edit { font-size: 13px; padding-right: 2px; }
  .tx-delete { font-size: 16px; }

  .rec-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .rec-row:last-child { border-bottom: none; }
  .rec-mid { flex: 1; min-width: 0; }
  .rec-desc { font-size: 13px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .rec-cat { font-size: 10.5px; color: var(--text-muted); }
  .rec-amount { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; flex-shrink: 0; }
  .rec-remove { font-size: 16px; }

  .backup-actions { display: flex; gap: 8px; }
  .backup-actions .btn-cancel { flex: 1; text-align: center; display: flex; align-items: center; justify-content: center; }
  .backup-msg { font-size: 12px; margin-top: 10px; text-align: center; }

  .footer-note { text-align: center; font-size: 11px; color: var(--text-muted); margin-top: 22px; }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  var STORAGE_KEY = 'razao-finance-data';
  var CATEGORIES = ['Salário', 'Freelance', 'Investimentos', 'Alimentação', 'Transporte', 'Moradia', 'Lazer', 'Saúde', 'Educação', 'Outros'];

  function todayISO() {
    return new Date().toISOString().slice(0, 10);
  }

  function blankForm() {
    return { type: 'expense', amount: '', description: '', category: CATEGORIES[3], date: todayISO(), recurring: false };
  }

  var state = {
    transactions: [],
    monthlyLimit: 2000,
    savingsGoal: 0,
    recurring: [],
    showForm: false,
    editingLimit: false,
    editingGoal: false,
    editingId: null,
    limitDraft: '2000',
    goalDraft: '0',
    formError: '',
    backupMsg: null,
    form: blankForm()
  };

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function formatCurrency(value) {
    return (value || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function formatDateShort(dateStr) {
    var d = new Date(dateStr + 'T00:00:00');
    var day = String(d.getDate()).padStart(2, '0');
    var month = d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '').toUpperCase();
    return day + ' ' + month;
  }

  function getLastMonths(n) {
    var months = [];
    var now = new Date();
    for (var i = n - 1; i >= 0; i--) {
      var d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      var key = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      var label = d.toLocaleDateString('pt-BR', { month: 'short' }).replace('.', '').toUpperCase();
      months.push({ key: key, label: label });
    }
    return months;
  }

  function loadState() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var data = JSON.parse(raw);
        state.transactions = Array.isArray(data.transactions) ? data.transactions : [];
        var lim = typeof data.monthlyLimit === 'number' ? data.monthlyLimit : 2000;
        state.monthlyLimit = lim;
        state.limitDraft = String(lim);
        var goal = typeof data.savingsGoal === 'number' ? data.savingsGoal : 0;
        state.savingsGoal = goal;
        state.goalDraft = String(goal);
        state.recurring = Array.isArray(data.recurring) ? data.recurring : [];
      }
    } catch (e) {
      // sem dados salvos ainda, ou armazenamento indisponível neste contexto
    }
  }

  function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        transactions: state.transactions,
        monthlyLimit: state.monthlyLimit,
        savingsGoal: state.savingsGoal,
        recurring: state.recurring
      }));
    } catch (e) {
      // armazenamento indisponível neste navegador/contexto
    }
  }

  function applyRecurring() {
    if (!state.recurring || state.recurring.length === 0) return;
    var now = new Date();
    var currentMonthKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    var changed = false;
    state.recurring.forEach(function (r) {
      var exists = state.transactions.some(function (t) { return t.recurringId === r.id && t.date && t.date.indexOf(currentMonthKey) === 0; });
      if (!exists) {
        state.transactions.unshift({
          id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
          type: r.type,
          amount: r.amount,
          description: r.description,
          category: r.category,
          date: todayISO(),
          recurringId: r.id
        });
        changed = true;
      }
    });
    if (changed) saveState();
  }

  function handleAdd() {
    var amount = parseFloat(String(state.form.amount).replace(',', '.'));
    if (!state.form.description.trim()) {
      state.formError = 'Preencha uma descrição.';
      render();
      return;
    }
    if (!amount || amount <= 0) {
      state.formError = 'Informe um valor maior que zero.';
      render();
      return;
    }
    state.formError = '';

    if (state.editingId) {
      var idx = state.transactions.findIndex(function (t) { return t.id === state.editingId; });
      if (idx !== -1) {
        var existing = state.transactions[idx];
        state.transactions[idx] = {
          id: existing.id,
          type: state.form.type,
          amount: amount,
          description: state.form.description.trim(),
          category: state.form.category,
          date: state.form.date,
          recurringId: existing.recurringId
        };
      }
      state.editingId = null;
    } else {
      var newTx = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        type: state.form.type,
        amount: amount,
        description: state.form.description.trim(),
        category: state.form.category,
        date: state.form.date
      };
      if (state.form.recurring) {
        var recId = 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
        newTx.recurringId = recId;
        state.recurring.push({ id: recId, type: newTx.type, amount: newTx.amount, description: newTx.description, category: newTx.category });
      }
      state.transactions.unshift(newTx);
    }

    state.form = blankForm();
    state.showForm = false;
    saveState();
    render();
  }

  function handleEdit(id) {
    var t = state.transactions.find(function (x) { return x.id === id; });
    if (!t) return;
    state.editingId = id;
    state.form = { type: t.type, amount: String(t.amount), description: t.description, category: t.category, date: t.date, recurring: false };
    state.formError = '';
    state.showForm = true;
    render();
  }

  function handleDelete(id) {
    state.transactions = state.transactions.filter(function (t) { return t.id !== id; });
    saveState();
    render();
  }

  function handleSaveLimit() {
    var val = parseFloat(String(state.limitDraft).replace(',', '.'));
    if (!isNaN(val) && val >= 0) state.monthlyLimit = val;
    state.editingLimit = false;
    saveState();
    render();
  }

  function handleSaveGoal() {
    var val = parseFloat(String(state.goalDraft).replace(',', '.'));
    if (!isNaN(val) && val >= 0) state.savingsGoal = val;
    state.editingGoal = false;
    saveState();
    render();
  }

  function handleRemoveRecurring(id) {
    state.recurring = state.recurring.filter(function (r) { return r.id !== id; });
    saveState();
    render();
  }

  function handleExport() {
    var data = {
      transactions: state.transactions,
      monthlyLimit: state.monthlyLimit,
      savingsGoal: state.savingsGoal,
      recurring: state.recurring
    };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'razao-backup-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    state.backupMsg = { type: 'success', text: 'Backup exportado.' };
    render();
  }

  function handleImportFile(file) {
    var reader = new FileReader();
    reader.onload = function (e) {
      try {
        var data = JSON.parse(e.target.result);
        if (!Array.isArray(data.transactions)) throw new Error('formato inválido');
        state.transactions = data.transactions;
        state.monthlyLimit = typeof data.monthlyLimit === 'number' ? data.monthlyLimit : state.monthlyLimit;
        state.savingsGoal = typeof data.savingsGoal === 'number' ? data.savingsGoal : 0;
        state.recurring = Array.isArray(data.recurring) ? data.recurring : [];
        state.limitDraft = String(state.monthlyLimit);
        state.goalDraft = String(state.savingsGoal);
        state.backupMsg = { type: 'success', text: 'Backup importado com sucesso.' };
        saveState();
        render();
      } catch (err) {
        state.backupMsg = { type: 'error', text: 'Não foi possível importar este arquivo.' };
        render();
      }
    };
    reader.readAsText(file);
  }

  function render() {
    var transactions = state.transactions;
    var totalIncome = transactions.filter(function (t) { return t.type === 'income'; }).reduce(function (s, t) { return s + t.amount; }, 0);
    var totalExpense = transactions.filter(function (t) { return t.type === 'expense'; }).reduce(function (s, t) { return s + t.amount; }, 0);
    var balance = totalIncome - totalExpense;

    var now = new Date();
    var currentMonthKey = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');
    var monthExpense = transactions
      .filter(function (t) { return t.type === 'expense' && t.date && t.date.indexOf(currentMonthKey) === 0; })
      .reduce(function (s, t) { return s + t.amount; }, 0);
    var monthIncome = transactions
      .filter(function (t) { return t.type === 'income' && t.date && t.date.indexOf(currentMonthKey) === 0; })
      .reduce(function (s, t) { return s + t.amount; }, 0);
    var monthNet = monthIncome - monthExpense;
    var percentUsed = state.monthlyLimit > 0 ? (monthExpense / state.monthlyLimit) * 100 : 0;
    var clamped = Math.max(0, Math.min(percentUsed, 100));

    var status = { label: 'EM DIA', color: 'var(--teal)', glow: 'var(--teal-glow)' };
    if (percentUsed >= 100) status = { label: 'ESTOURADO', color: 'var(--rose)', glow: 'var(--rose-glow)' };
    else if (percentUsed >= 80) status = { label: 'ATENÇÃO', color: 'var(--amber)', glow: 'var(--amber-glow)' };

    var monthName = now.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
    var sortedTx = transactions.slice().sort(function (a, b) { return (b.date || '').localeCompare(a.date || ''); });

    var months = getLastMonths(6);
    var monthStats = months.map(function (m, idx) {
      var inc = transactions.filter(function (t) { return t.type === 'income' && t.date && t.date.indexOf(m.key) === 0; }).reduce(function (s, t) { return s + t.amount; }, 0);
      var exp = transactions.filter(function (t) { return t.type === 'expense' && t.date && t.date.indexOf(m.key) === 0; }).reduce(function (s, t) { return s + t.amount; }, 0);
      return { key: m.key, label: m.label, income: inc, expense: exp, isCurrent: idx === months.length - 1 };
    });
    var maxBar = monthStats.reduce(function (mx, m) { return Math.max(mx, m.income, m.expense); }, 0);
    var maxScale = Math.max(state.monthlyLimit, maxBar, 1) * 1.15;
    var limitPct = Math.min((state.monthlyLimit / maxScale) * 100, 100);

    var catTotals = {};
    transactions.filter(function (t) { return t.type === 'expense' && t.date && t.date.indexOf(currentMonthKey) === 0; }).forEach(function (t) {
      catTotals[t.category] = (catTotals[t.category] || 0) + t.amount;
    });
    var catList = Object.keys(catTotals).map(function (k) { return { category: k, total: catTotals[k] }; });
    catList.sort(function (a, b) { return b.total - a.total; });

    var goalPct = state.savingsGoal > 0 ? Math.max(0, Math.min((monthNet / state.savingsGoal) * 100, 100)) : 0;
    var goalColor = monthNet < 0 ? 'var(--rose)' : (state.savingsGoal > 0 && monthNet >= state.savingsGoal ? 'var(--teal)' : 'var(--amber)');
    var goalMsg;
    if (state.savingsGoal <= 0) {
      goalMsg = 'Defina uma meta para acompanhar.';
    } else if (monthNet < 0) {
      goalMsg = 'Gastos maiores que entradas este mês.';
    } else if (monthNet >= state.savingsGoal) {
      goalMsg = 'Meta batida! Você guardou ' + formatCurrency(monthNet) + '.';
    } else {
      goalMsg = 'Faltam ' + formatCurrency(state.savingsGoal - monthNet) + ' para a meta.';
    }

    var r = 54;
    var circumference = 2 * Math.PI * r;
    var offset = circumference * (1 - clamped / 100);

    var html = '';

    html += '<header class="topbar">';
    html += '<div><div class="eyebrow">Painel financeiro</div><div class="brand">RAZÃO</div></div>';
    html += '<div class="status-pill"><span class="led' + (percentUsed >= 100 ? ' blinking' : '') + '" style="background:' + status.color + '; box-shadow:0 0 6px 2px ' + status.glow + ';"></span><span style="color:' + status.color + '">' + status.label + '</span></div>';
    html += '</header>';
    html += '<div class="month-label">' + escapeHtml(monthName) + '</div>';

    html += '<div class="stats-grid">';
    html += '<div class="stat-card stat-balance"><div class="stat-label">Saldo</div><div class="stat-value" style="color:' + (balance >= 0 ? 'var(--teal)' : 'var(--rose)') + '">' + formatCurrency(balance) + '</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Entradas</div><div class="stat-value" style="color:var(--teal)">+' + formatCurrency(totalIncome) + '</div></div>';
    html += '<div class="stat-card"><div class="stat-label">Saídas</div><div class="stat-value" style="color:var(--rose)">\u2212' + formatCurrency(totalExpense) + '</div></div>';
    html += '</div>';

    html += '<div class="card gauge-card' + (percentUsed >= 100 ? ' gauge-alert' : '') + '">';
    html += '<div class="card-header">Limite mensal</div>';
    html += '<div class="gauge-wrap"><svg width="140" height="140" viewBox="0 0 140 140">';
    html += '<circle cx="70" cy="70" r="' + r + '" stroke="var(--border)" stroke-width="12" fill="none"/>';
    html += '<circle cx="70" cy="70" r="' + r + '" stroke="' + status.color + '" stroke-width="12" fill="none" stroke-linecap="round" stroke-dasharray="' + circumference.toFixed(1) + '" stroke-dashoffset="' + offset.toFixed(1) + '" transform="rotate(-90 70 70)" style="transition:stroke-dashoffset 0.4s ease;"/>';
    html += '</svg><div class="gauge-center"><div class="gauge-pct" style="color:' + status.color + '">' + Math.round(clamped) + '%</div><div class="gauge-sub">do limite</div></div></div>';
    html += '<div class="gauge-info">';
    if (state.editingLimit) {
      html += '<div class="limit-edit-row">';
      html += '<input id="limit-input" class="limit-input" type="text" inputmode="decimal" value="' + escapeHtml(state.limitDraft) + '">';
      html += '<button id="save-limit-btn" class="btn-dark-sm">Salvar</button>';
      html += '</div>';
    } else {
      html += '<div class="limit-row">';
      html += '<span class="limit-value">' + formatCurrency(state.monthlyLimit) + '</span>';
      html += '<button id="edit-limit-btn" class="edit-link">editar</button>';
      html += '</div>';
    }
    html += '<div class="spent-row">Gasto: <strong>' + formatCurrency(monthExpense) + '</strong></div>';
    html += '</div>';
    if (percentUsed >= 80) {
      var msg = percentUsed >= 100
        ? 'Limite ultrapassado em ' + formatCurrency(monthExpense - state.monthlyLimit) + '.'
        : 'Faltam ' + formatCurrency(state.monthlyLimit - monthExpense) + ' para o limite.';
      html += '<div class="alert-line" style="color:' + status.color + '">' + msg + '</div>';
    }
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="card-header">Meta de economia · este mês</div>';
    if (state.editingGoal) {
      html += '<div class="limit-edit-row">';
      html += '<input id="goal-input" class="limit-input" type="text" inputmode="decimal" value="' + escapeHtml(state.goalDraft) + '">';
      html += '<button id="save-goal-btn" class="btn-dark-sm">Salvar</button>';
      html += '</div>';
    } else {
      html += '<div class="limit-row">';
      html += '<span class="limit-value">' + formatCurrency(state.savingsGoal) + '</span>';
      html += '<button id="edit-goal-btn" class="edit-link">editar</button>';
      html += '</div>';
    }
    html += '<div class="progress-track"><div class="progress-fill" style="width:' + goalPct.toFixed(1) + '%; background:' + goalColor + '"></div></div>';
    html += '<div class="goal-msg" style="color:' + goalColor + '">' + escapeHtml(goalMsg) + '</div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="card-header">Comparativo mensal</div>';
    html += '<div class="chart-legend-top"><span><span class="dot" style="background:var(--teal)"></span>Entradas</span><span><span class="dot" style="background:var(--rose)"></span>Saídas</span></div>';
    html += '<div class="bar-chart">';
    html += '<div class="limit-line" style="bottom:' + limitPct.toFixed(1) + '%"></div>';
    html += '<div class="bars-row">';
    monthStats.forEach(function (m) {
      var incPct = (m.income / maxScale) * 100;
      var expPct = (m.expense / maxScale) * 100;
      var overLimit = state.monthlyLimit > 0 && m.expense > state.monthlyLimit;
      html += '<div class="bar-col">';
      html += '<div class="bar-wrap">';
      html += '<div class="bar bar-income" style="height:' + incPct.toFixed(1) + '%"></div>';
      html += '<div class="bar bar-expense" style="height:' + expPct.toFixed(1) + '%' + (overLimit ? '; box-shadow:0 0 8px 0 var(--rose-glow)' : '') + '"></div>';
      html += '</div>';
      html += '<div class="bar-label' + (m.isCurrent ? ' bar-label-current' : '') + '">' + m.label + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
    html += '<div class="chart-legend">tracejado = limite mensal de gastos</div>';
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="card-header">Gastos por categoria · este mês</div>';
    if (catList.length === 0) {
      html += '<div class="empty-state">Nenhum gasto registrado este mês ainda.</div>';
    } else {
      catList.forEach(function (c) {
        var pct = monthExpense > 0 ? (c.total / monthExpense) * 100 : 0;
        html += '<div class="cat-row">';
        html += '<div class="cat-row-top"><span class="cat-name">' + escapeHtml(c.category) + '</span><span class="cat-amount">' + formatCurrency(c.total) + '</span></div>';
        html += '<div class="cat-bar-track"><div class="cat-bar-fill" style="width:' + pct.toFixed(1) + '%"></div></div>';
        html += '</div>';
      });
    }
    html += '</div>';

    if (!state.showForm) {
      html += '<button id="open-form-btn" class="btn-primary">+ Novo lançamento</button>';
    } else {
      html += '<div class="form-panel">';
      html += '<div class="type-row">';
      html += '<button id="type-income-btn" class="type-btn' + (state.form.type === 'income' ? ' active-income' : '') + '">Entrada</button>';
      html += '<button id="type-expense-btn" class="type-btn' + (state.form.type === 'expense' ? ' active-expense' : '') + '">Saída</button>';
      html += '</div>';

      html += '<label class="field-label">Valor</label>';
      html += '<input id="amount-input" class="field-input mono" type="text" inputmode="decimal" placeholder="0,00" value="' + escapeHtml(state.form.amount) + '">';

      html += '<label class="field-label">Descrição</label>';
      html += '<input id="desc-input" class="field-input" type="text" placeholder="Ex: Mercado, Salário..." value="' + escapeHtml(state.form.description) + '">';

      html += '<div class="field-row">';
      html += '<div class="field-half"><label class="field-label">Categoria</label><select id="category-select" class="field-input" style="margin-bottom:0">';
      CATEGORIES.forEach(function (c) {
        html += '<option value="' + escapeHtml(c) + '"' + (state.form.category === c ? ' selected' : '') + '>' + escapeHtml(c) + '</option>';
      });
      html += '</select></div>';
      html += '<div class="field-half"><label class="field-label">Data</label><input id="date-input" class="field-input" style="margin-bottom:0" type="date" value="' + escapeHtml(state.form.date) + '"></div>';
      html += '</div>';

      if (!state.editingId) {
        html += '<label class="checkbox-row"><input type="checkbox" id="recurring-checkbox"' + (state.form.recurring ? ' checked' : '') + '> Repetir todo mês</label>';
      }

      if (state.formError) {
        html += '<div class="form-error">' + escapeHtml(state.formError) + '</div>';
      }

      html += '<div class="form-actions">';
      html += '<button id="submit-btn" class="btn-submit">' + (state.editingId ? 'Salvar alterações' : 'Lançar') + '</button>';
      html += '<button id="cancel-btn" class="btn-cancel">Cancelar</button>';
      html += '</div>';
      html += '</div>';
    }

    html += '<div class="section-label">Lançamentos recentes</div>';
    if (sortedTx.length === 0) {
      html += '<div class="empty-state">Nenhum lançamento ainda.<br>Toque em "+ Novo lançamento" para começar.</div>';
    } else {
      html += '<div class="list-card">';
      sortedTx.forEach(function (t) {
        var color = t.type === 'income' ? 'var(--teal)' : 'var(--rose)';
        var sign = t.type === 'income' ? '+' : '\u2212';
        html += '<div class="tx-row ' + (t.type === 'income' ? 'income' : 'expense') + '">';
        html += '<div class="tx-date">' + formatDateShort(t.date) + '</div>';
        html += '<div class="tx-mid"><div class="tx-desc">' + escapeHtml(t.description) + '</div><div class="tx-cat">' + escapeHtml(t.category) + '</div></div>';
        html += '<div class="tx-amount" style="color:' + color + '">' + sign + ' ' + formatCurrency(t.amount) + '</div>';
        html += '<button class="tx-edit" data-id="' + escapeHtml(t.id) + '" aria-label="Editar lançamento">\u270E</button>';
        html += '<button class="tx-delete" data-id="' + escapeHtml(t.id) + '" aria-label="Remover lançamento">\u00d7</button>';
        html += '</div>';
      });
      html += '</div>';
    }

    html += '<div class="card">';
    html += '<div class="card-header">Lançamentos recorrentes</div>';
    if (!state.recurring || state.recurring.length === 0) {
      html += '<div class="empty-state">Nenhum lançamento recorrente.<br>Marque "Repetir todo mês" ao criar um lançamento.</div>';
    } else {
      state.recurring.forEach(function (r) {
        var rcolor = r.type === 'income' ? 'var(--teal)' : 'var(--rose)';
        var rsign = r.type === 'income' ? '+' : '\u2212';
        html += '<div class="rec-row">';
        html += '<div class="rec-mid"><div class="rec-desc">' + escapeHtml(r.description) + '</div><div class="rec-cat">' + escapeHtml(r.category) + ' · todo mês</div></div>';
        html += '<div class="rec-amount" style="color:' + rcolor + '">' + rsign + ' ' + formatCurrency(r.amount) + '</div>';
        html += '<button class="rec-remove" data-id="' + escapeHtml(r.id) + '" aria-label="Remover recorrência">\u00d7</button>';
        html += '</div>';
      });
    }
    html += '</div>';

    html += '<div class="card">';
    html += '<div class="card-header">Backup dos dados</div>';
    html += '<div class="backup-actions">';
    html += '<button id="export-btn" class="btn-cancel">\u2B07 Exportar</button>';
    html += '<label class="btn-cancel">\u2B06 Importar<input type="file" id="import-input" accept="application/json" style="display:none"></label>';
    html += '</div>';
    if (state.backupMsg) {
      html += '<div class="backup-msg" style="color:' + (state.backupMsg.type === 'success' ? 'var(--teal)' : 'var(--rose)') + '">' + escapeHtml(state.backupMsg.text) + '</div>';
    }
    html += '</div>';

    html += '<div class="footer-note">Lançamentos salvos automaticamente neste navegador.</div>';

    document.getElementById('app').innerHTML = html;
    bindEvents();
  }

  function bindEvents() {
    var openFormBtn = document.getElementById('open-form-btn');
    if (openFormBtn) openFormBtn.addEventListener('click', function () {
      state.editingId = null;
      state.form = blankForm();
      state.formError = '';
      state.showForm = true;
      render();
    });

    var editLimitBtn = document.getElementById('edit-limit-btn');
    if (editLimitBtn) editLimitBtn.addEventListener('click', function () { state.limitDraft = String(state.monthlyLimit); state.editingLimit = true; render(); });

    var limitInput = document.getElementById('limit-input');
    if (limitInput) limitInput.addEventListener('input', function (e) { state.limitDraft = e.target.value; });

    var saveLimitBtn = document.getElementById('save-limit-btn');
    if (saveLimitBtn) saveLimitBtn.addEventListener('click', handleSaveLimit);

    var editGoalBtn = document.getElementById('edit-goal-btn');
    if (editGoalBtn) editGoalBtn.addEventListener('click', function () { state.goalDraft = String(state.savingsGoal); state.editingGoal = true; render(); });

    var goalInput = document.getElementById('goal-input');
    if (goalInput) goalInput.addEventListener('input', function (e) { state.goalDraft = e.target.value; });

    var saveGoalBtn = document.getElementById('save-goal-btn');
    if (saveGoalBtn) saveGoalBtn.addEventListener('click', handleSaveGoal);

    var typeIncomeBtn = document.getElementById('type-income-btn');
    if (typeIncomeBtn) typeIncomeBtn.addEventListener('click', function () { state.form.type = 'income'; render(); });

    var typeExpenseBtn = document.getElementById('type-expense-btn');
    if (typeExpenseBtn) typeExpenseBtn.addEventListener('click', function () { state.form.type = 'expense'; render(); });

    var amountInput = document.getElementById('amount-input');
    if (amountInput) amountInput.addEventListener('input', function (e) { state.form.amount = e.target.value; });

    var descInput = document.getElementById('desc-input');
    if (descInput) descInput.addEventListener('input', function (e) { state.form.description = e.target.value; });

    var categorySelect = document.getElementById('category-select');
    if (categorySelect) categorySelect.addEventListener('change', function (e) { state.form.category = e.target.value; });

    var dateInput = document.getElementById('date-input');
    if (dateInput) dateInput.addEventListener('change', function (e) { state.form.date = e.target.value; });

    var recurringCheckbox = document.getElementById('recurring-checkbox');
    if (recurringCheckbox) recurringCheckbox.addEventListener('change', function (e) { state.form.recurring = e.target.checked; });

    var submitBtn = document.getElementById('submit-btn');
    if (submitBtn) submitBtn.addEventListener('click', handleAdd);

    var cancelBtn = document.getElementById('cancel-btn');
    if (cancelBtn) cancelBtn.addEventListener('click', function () { state.showForm = false; state.formError = ''; state.editingId = null; render(); });

    var editBtns = document.querySelectorAll('.tx-edit');
    for (var i = 0; i < editBtns.length; i++) {
      editBtns[i].addEventListener('click', function (e) { handleEdit(e.currentTarget.getAttribute('data-id')); });
    }

    var deleteBtns = document.querySelectorAll('.tx-delete');
    for (var j = 0; j < deleteBtns.length; j++) {
      deleteBtns[j].addEventListener('click', function (e) { handleDelete(e.currentTarget.getAttribute('data-id')); });
    }

    var recRemoveBtns = document.querySelectorAll('.rec-remove');
    for (var k = 0; k < recRemoveBtns.length; k++) {
      recRemoveBtns[k].addEventListener('click', function (e) { handleRemoveRecurring(e.currentTarget.getAttribute('data-id')); });
    }

    var exportBtn = document.getElementById('export-btn');
    if (exportBtn) exportBtn.addEventListener('click', handleExport);

    var importInput = document.getElementById('import-input');
    if (importInput) importInput.addEventListener('change', function (e) {
      if (e.target.files && e.target.files[0]) handleImportFile(e.target.files[0]);
    });
  }

  loadState();
  applyRecurring();
  render();
})();
</script>
</body>
</html>
